name: xmpp_dart
description: >-
  A lightweight, dependency-minimal Dart XMPP client over TCP: STARTTLS/direct
  TLS, SASL SCRAM-SHA-1/PLAIN, resource binding, IQ, XEP-0198 with resumption,
  and DNS SRV.
version: 0.1.1
repository: https://github.com/romanbsd/xmpp_dart
issue_tracker: https://github.com/romanbsd/xmpp_dart/issues
topics:
  - xmpp
  - chat
  - messaging
  - networking

environment:
  sdk: ^3.12.2

dependencies:
  crypto: ^3.0.0
  xml: ^7.0.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
