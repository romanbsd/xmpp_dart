# Static analysis for this Dart package (not Flutter).
# Builds on the official recommended lints and adds stricter type checking
# plus additional rules suited to library code.

include: package:lints/recommended.yaml

analyzer:
  exclude:
    - build/**
  language:
    # Catch implicit downcasts, inference to dynamic, and raw generic types.
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    missing_return: error
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning

linter:
  rules:
    # Types & public APIs
    - always_declare_return_types
    - type_annotate_public_apis
    - tighten_type_of_initializing_formals

    # Imports & file structure
    - combinators_ordering
    - directives_ordering
    - eol_at_end_of_file
    - sort_pub_dependencies

    # Immutability & locals
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_in_for_each
    - prefer_final_locals

    # Async & resource safety
    - cancel_subscriptions
    - close_sinks
    - discarded_futures
    - unawaited_futures
    - unnecessary_await_in_return

    # Code quality
    - always_put_required_named_parameters_first
    - avoid_print
    - avoid_redundant_argument_values
    - document_ignores
    - literal_only_boolean_expressions
    - noop_primitive_operations
    - prefer_single_quotes
    - require_trailing_commas
    - throw_in_finally
    - unnecessary_breaks
    - unnecessary_lambdas
    - unnecessary_parenthesis
    - unnecessary_raw_strings
    - use_named_constants
    - use_setters_to_change_properties
    - use_string_buffers
    - use_to_and_as_if_applicable
formatter:
  page_width: 120
